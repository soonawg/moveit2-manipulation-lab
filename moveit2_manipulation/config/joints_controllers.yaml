# <!-- 08/31 마지막으로 수정한 부분 -->  - 정상 작동
# --- 변경점: 아래에 새로운 그리퍼 컨트롤러 설정을 추가합니다 ---
gripper_trajectory_controller:
  ros__parameters:
    joints:
      - tcp_connector__gripper_right
      - tcp_connector__gripper_left
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    gains: # 두 조인트 모두에 대한 게인 값을 설정해줍니다.
      tcp_connector__gripper_right: {p: 50.0, i: 5.0, d: 10.0, i_clamp: 10.0}
      tcp_connector__gripper_left: {p: 50.0, i: 5.0, d: 10.0, i_clamp: 10.0}