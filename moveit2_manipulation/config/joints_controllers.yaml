      - velocity
    gains:
      link2__link3: {p: 1700.0, i: 50.0, d: 70.0, i_clamp: 100.0}

joint4_position_controller:
  ros__parameters:
    joints:
      - link3__link4
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    gains:
      link3__link4: {p: 2000.0, i: 50.0, d: 100.0, i_clamp: 100.0}

joint5_position_controller:
  ros__parameters:
    joints:
      - link4__link5
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    gains:
      link4__link5: {p: 700.0, i: 50.0, d: 70.0, i_clamp: 100.0}

joint6_position_controller:
  ros__parameters:
    joints:
      - link5__tcp_connector
    command_interfaces:
