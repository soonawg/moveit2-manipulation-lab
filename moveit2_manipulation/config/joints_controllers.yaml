controller_manager:
  ros__parameters:
    update_rate: 50

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint1_position_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint2_position_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint3_position_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint4_position_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint5_position_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint6_position_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # gripper_right_position_controller:
    #   type: joint_trajectory_controller/JointTrajectoryController

    # gripper_left_position_controller:
    #   type: joint_trajectory_controller/JointTrajectoryController

    # --- 변경점: 아래 gripper_right/left 컨트롤러를 하나의 컨트롤러로 통합 ---
    gripper_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController


joint_state_broadcaster:
  ros__parameters: {}

joint1_position_controller:
  ros__parameters:
    joints:
      - base_link__link1
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    gains:
      base_link__link1: {p: 700.0, i: 50.0, d: 70.0, i_clamp: 100.0}

joint2_position_controller:
  ros__parameters:
    joints:
      - link1__link2
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    gains:
      link1__link2: {p: 700.0, i: 50.0, d: 70.0, i_clamp: 100.0}


